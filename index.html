<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvatarOS — system.reboot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hero background -->
  <div class="hero-bg">
    <div class="hero-overlay"></div>
  </div>

  <!-- Top nav logo -->
  <header class="site-header">
    <div class="wordmark">AVATAR<span class="tight"><span class="dot">_</span><span class="os">OS</span></span></div>
  </header>

  <!-- Main content -->
  <main class="main-content">

    <div class="hero-text">
      <h1 class="hero-title">AVATAR<span class="tight"><span class="dot">_</span><span class="os">OS</span></span></h1>
      <p class="tagline"><span class="cursor-blink">_</span> system.reboot</p>
      <p class="sub-tagline">From fragmented self to integrated sovereign.</p>
    </div>

    <div class="divider-glyph" aria-hidden="true">◈</div>

    <!-- Signup form -->
    <section class="signup-card">
      <p class="form-label">GET EARLY ACCESS</p>
      <form class="signup-form" id="signupForm">
        <div class="field-group">
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your name"
            autocomplete="name"
            required
          />
        </div>
        <div class="field-group">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Your email"
            autocomplete="email"
            required
          />
        </div>
        <button type="submit" class="cta-btn">
          <span class="btn-text">Get Early Access</span>
          <span class="btn-arrow">→</span>
        </button>
      </form>
      <p class="form-disclaimer">No spam. Pure signal. Unsubscribe any time.</p>
    </section>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="footer-copy">© 2026 AvatarOS</span>
    <span class="footer-sep">·</span>
    <span class="footer-tagline">Consciousness. Creation. Legacy.</span>
  </footer>

  <script src="main.js"></script>
</body>
</html>
